<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Muzik Match — หาเพลงและศิลปินที่ใช่</title>
<meta name="description" content="พิมพ์ชื่อเพลงหรือศิลปินที่ชอบ แล้ว AI จะหาเพลงและวงที่ใกล้เคียงให้คุณทันที" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0e1a;
    --bg-soft: #121829;
    --card: #161d33;
    --card-hover: #1c2540;
    --line: #283250;
    --accent: #4d8dff;
    --accent-soft: #2a4a8a;
    --accent-glow: rgba(77, 141, 255, 0.25);
    --text: #eaf0ff;
    --text-dim: #8a96b8;
    --text-faint: #5a6485;
    --good: #3ddc97;
    --warn: #ffb454;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'IBM Plex Sans Thai', 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -30%; left: 50%;
    transform: translateX(-50%);
    width: 900px; height: 900px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 56px 20px 80px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    justify-content: center;
  }
  .logo {
    width: 46px; height: 46px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #6ba4ff);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px var(--accent-glow);
    flex-shrink: 0;
  }
  .logo svg { width: 26px; height: 26px; }
  .brand h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .tagline {
    color: var(--text-dim);
    font-size: 16px;
    margin-bottom: 40px;
    text-align: center;
  }

  .search-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 24px;
    margin-bottom: 36px;
  }
  .search-label {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .input-row { display: flex; gap: 10px; }
  #q {
    flex: 1;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 15px 16px;
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #q:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  #q::placeholder { color: var(--text-faint); }
  #go {
    background: linear-gradient(135deg, var(--accent), #6ba4ff);
    border: none;
    border-radius: 12px;
    padding: 0 26px;
    color: white;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    white-space: nowrap;
  }
  #go:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
  #go:active:not(:disabled) { transform: translateY(0); }
  #go:disabled { opacity: 0.5; cursor: not-allowed; }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }
  .chip {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 7px 15px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }

  #results { display: flex; flex-direction: column; gap: 16px; }
  .result-section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 8px 0 -4px;
  }
  .card-item {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 20px;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    animation: rise 0.4s ease backwards;
  }
  .card-item:hover { background: var(--card-hover); border-color: var(--accent-soft); transform: translateY(-2px); }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .card-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }
  .card-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .card-meta { font-size: 13px; color: var(--accent); font-weight: 500; white-space: nowrap; }
  .card-why { font-size: 14px; color: var(--text-dim); }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag {
    font-size: 11px;
    background: var(--accent-soft);
    color: #b8d0ff;
    padding: 3px 10px;
    border-radius: 12px;
  }

  .loading { text-align: center; padding: 50px 0; color: var(--text-dim); }
  .spinner {
    width: 40px; height: 40px;
    margin: 0 auto 16px;
    border: 3px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; }

  .notice {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-faint);
  }
  .notice svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
  .notice.error { color: var(--warn); }
  .notice p { font-size: 14px; max-width: 420px; margin: 0 auto; }

  footer {
    text-align: center;
    margin-top: 50px;
    color: var(--text-faint);
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
    </div>
    <h1>Muzik Match</h1>
  </div>
  <p class="tagline">พิมพ์ชื่อเพลงหรือศิลปินที่ชอบ แล้ว AI จะหาเพลงและวงที่ใกล้เคียงให้ทันที</p>

  <div class="search-card">
    <div class="search-label">เพลงหรือศิลปินที่คุณชอบ</div>
    <div class="input-row">
      <input id="q" type="text" placeholder="เช่น Bodyslam, Taylor Swift, หรือ ชื่อเพลง..." autofocus />
      <button id="go">ค้นหา</button>
    </div>
    <div class="chips" id="chips">
      <span class="chip">Bodyslam</span>
      <span class="chip">The Weeknd</span>
      <span class="chip">Three Man Down</span>
      <span class="chip">Newjeans</span>
      <span class="chip">Coldplay</span>
    </div>
  </div>

  <div id="results"></div>

  <div class="notice" id="welcome">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
    </svg>
    <p>พิมพ์ชื่อเพลงหรือศิลปินที่ชอบด้านบน แล้วกดค้นหาได้เลย</p>
  </div>

  <footer>Muzik Match · ขับเคลื่อนด้วย AI</footer>
</div>

<script>
const $ = s => document.querySelector(s);
const q = $('#q');
const go = $('#go');
const results = $('#results');
const welcome = $('#welcome');

$('#chips').addEventListener('click', e => {
  if (e.target.classList.contains('chip')) { q.value = e.target.textContent; search(); }
});
go.addEventListener('click', search);
q.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

async function search() {
  const query = q.value.trim();
  if (!query) { q.focus(); return; }

  welcome.style.display = 'none';
  go.disabled = true;
  results.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">กำลังค้นหาเพลงและศิลปินที่ใกล้เคียงกับ "${escapeHtml(query)}"...</div></div>`;

  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'เกิดข้อผิดพลาด');
    render(data, query);
  } catch (err) {
    showError(escapeHtml(err.message));
  } finally {
    go.disabled = false;
  }
}

function render(data, query) {
  let html = '';
  if (data.artists?.length) {
    html += `<div class="result-section-title">🎤 ศิลปิน / วงที่คุณน่าจะชอบ</div>`;
    data.artists.forEach((a, i) => { html += card(a.name, a.genre, a.why, a.tags, i); });
  }
  if (data.songs?.length) {
    html += `<div class="result-section-title">🎵 เพลงแนะนำ</div>`;
    data.songs.forEach((s, i) => { html += card(s.name, s.artist, s.why, s.tags, i + (data.artists?.length || 0)); });
  }
  if (!html) { showError('ไม่พบผลลัพธ์ ลองพิมพ์ชื่ออื่นดูครับ'); return; }
  results.innerHTML = html;
}

function card(name, meta, why, tags, i) {
  const tagHtml = (tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
  return `<div class="card-item" style="animation-delay:${i * 0.06}s">
    <div class="card-head">
      <span class="card-name">${escapeHtml(name)}</span>
      <span class="card-meta">${escapeHtml(meta || '')}</span>
    </div>
    <div class="card-why">${escapeHtml(why || '')}</div>
    ${tagHtml ? `<div class="card-tags">${tagHtml}</div>` : ''}
  </div>`;
}

function showError(msg) {
  results.innerHTML = `<div class="notice error">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    <p>${msg}</p>
  </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
