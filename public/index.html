<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Muzik Match — หาเพลงและศิลปินที่ใช่</title>
<meta name="description" content="พิมพ์ชื่อเพลงหรือศิลปินที่ชอบ แล้ว AI จะหาเพลงและวงที่ใกล้เคียงให้คุณทันที" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0e1a; --bg-soft: #121829; --card: #161d33; --card-hover: #1c2540;
    --line: #283250; --accent: #4d8dff; --accent-soft: #2a4a8a;
    --accent-glow: rgba(77,141,255,0.25); --text: #eaf0ff; --text-dim: #8a96b8;
    --text-faint: #5a6485; --good: #3ddc97; --warn: #ffb454;
    --yt: #ff4d4d; --sp: #1db954;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'IBM Plex Sans Thai','Space Grotesk',sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    line-height: 1.6; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; top: -30%; left: 50%;
    transform: translateX(-50%); width: 900px; height: 900px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 56px 20px 80px; }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; justify-content: center; }
  .logo {
    width: 46px; height: 46px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #6ba4ff);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px var(--accent-glow); flex-shrink: 0;
  }
  .logo svg { width: 26px; height: 26px; }
  .brand h1 { font-family: 'Space Grotesk',sans-serif; font-size: 30px; font-weight: 700; letter-spacing: -0.5px; }
  .tagline { color: var(--text-dim); font-size: 16px; margin-bottom: 40px; text-align: center; }
  .search-card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 24px; margin-bottom: 20px; }
  .search-label { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; font-weight: 500; }
  .input-row { display: flex; gap: 10px; }
  #q {
    flex: 1; background: var(--bg-soft); border: 1px solid var(--line);
    border-radius: 12px; padding: 15px 16px; color: var(--text);
    font-size: 16px; font-family: inherit; transition: border-color 0.2s, box-shadow 0.2s;
  }
  #q:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  #q::placeholder { color: var(--text-faint); }
  #go {
    background: linear-gradient(135deg, var(--accent), #6ba4ff); border: none;
    border-radius: 12px; padding: 0 26px; color: white; font-size: 16px;
    font-weight: 600; font-family: inherit; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s; white-space: nowrap;
  }
  #go:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
  #go:active:not(:disabled) { transform: translateY(0); }
  #go:disabled { opacity: 0.5; cursor: not-allowed; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .chip {
    background: var(--bg-soft); border: 1px solid var(--line); border-radius: 20px;
    padding: 7px 15px; font-size: 13px; color: var(--text-dim); cursor: pointer; transition: all 0.15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.history { border-style: dashed; }
  .history-bar { margin-bottom: 36px; display: none; }
  .history-bar.show { display: block; }
  .history-label { font-size: 12px; color: var(--text-faint); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .history-clear { cursor: pointer; color: var(--text-faint); font-size: 11px; }
  .history-clear:hover { color: var(--warn); }
  #results { display: flex; flex-direction: column; gap: 16px; }
  .result-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 8px 0 -4px; }
  .result-section-title { font-family: 'Space Grotesk',sans-serif; font-size: 14px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .share-btn {
    display: flex; align-items: center; gap: 6px; background: var(--bg-soft);
    border: 1px solid var(--line); border-radius: 10px; padding: 7px 12px;
    font-size: 12px; color: var(--text-dim); cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .share-btn:hover { border-color: var(--accent); color: var(--text); }
  .share-btn svg { width: 14px; height: 14px; }
  .share-btn.done { color: var(--good); border-color: var(--good); }
  .card-item {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 18px 20px; transition: background 0.2s, border-color 0.2s, transform 0.2s;
    animation: rise 0.4s ease backwards;
  }
  .card-item:hover { background: var(--card-hover); border-color: var(--accent-soft); transform: translateY(-2px); }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* Artist card with image */
  .artist-row { display: flex; gap: 16px; align-items: flex-start; }
  .artist-img {
    width: 64px; height: 64px; border-radius: 14px; flex-shrink: 0;
    background: var(--bg-soft); border: 1px solid var(--line);
    object-fit: cover; display: block;
  }
  .artist-img-fallback {
    width: 64px; height: 64px; border-radius: 14px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent-soft), var(--bg-soft));
    border: 1px solid var(--line); display: flex; align-items: center; justify-content: center;
  }
  .artist-img-fallback svg { width: 32px; height: 32px; color: var(--text-faint); }
  .artist-body { flex: 1; min-width: 0; }

  .card-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
  .card-name { font-family: 'Space Grotesk',sans-serif; font-size: 18px; font-weight: 600; color: var(--text); }
  .card-meta { font-size: 13px; color: var(--accent); font-weight: 500; white-space: nowrap; }
  .card-why { font-size: 14px; color: var(--text-dim); }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag { font-size: 11px; background: var(--accent-soft); color: #b8d0ff; padding: 3px 10px; border-radius: 12px; }

  .listen-row { display: flex; gap: 8px; margin-top: 14px; }
  .listen-btn {
    display: flex; align-items: center; gap: 6px; text-decoration: none; background: none;
    border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 500;
    transition: transform 0.15s, opacity 0.2s; font-family: inherit; cursor: pointer;
  }
  .listen-btn:hover { transform: translateY(-1px); opacity: 0.9; }
  .listen-btn svg { width: 16px; height: 16px; }
  .listen-yt { background: rgba(255,77,77,0.15); color: var(--yt); border: 1px solid rgba(255,77,77,0.3); }
  .listen-yt.active { background: var(--yt); color: white; }
  .listen-sp { background: rgba(29,185,84,0.15); color: var(--sp); border: 1px solid rgba(29,185,84,0.3); }

  /* YouTube accordion player */
  .yt-player { max-height: 0; overflow: hidden; transition: max-height 0.45s ease, margin 0.45s ease; }
  .yt-player.open { max-height: 520px; margin-top: 14px; }
  .yt-frame-box {
    position: relative; width: 100%; padding-bottom: 56.25%; height: 0;
    border-radius: 12px; overflow: hidden; background: #000; border: 1px solid var(--line);
  }
  .yt-frame-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

  .loading { text-align: center; padding: 50px 0; color: var(--text-dim); }
  .spinner { width: 40px; height: 40px; margin: 0 auto 16px; border: 3px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; }
  .notice { text-align: center; padding: 40px 20px; color: var(--text-faint); }
  .notice svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
  .notice.error { color: var(--warn); }
  .notice p { font-size: 14px; max-width: 420px; margin: 0 auto; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--card); border: 1px solid var(--accent-soft); color: var(--text);
    padding: 12px 20px; border-radius: 12px; font-size: 14px; z-index: 50;
    transition: transform 0.3s ease; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  footer { text-align: center; margin-top: 50px; color: var(--text-faint); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
    </div>
    <h1>Muzik Match</h1>
  </div>
  <p class="tagline">พิมพ์ชื่อเพลงหรือศิลปินที่ชอบ แล้ว AI จะหาเพลงและวงที่ใกล้เคียงให้ทันที</p>

  <div class="search-card">
    <div class="search-label">เพลงหรือศิลปินที่คุณชอบ</div>
    <div class="input-row">
      <input id="q" type="text" placeholder="เช่น Bodyslam, Taylor Swift, หรือ ชื่อเพลง..." autofocus />
      <button id="go">ค้นหา</button>
    </div>
    <div class="chips" id="chips">
      <span class="chip">Bodyslam</span>
      <span class="chip">The Weeknd</span>
      <span class="chip">Three Man Down</span>
      <span class="chip">Newjeans</span>
      <span class="chip">Coldplay</span>
    </div>
  </div>

  <div class="history-bar" id="historyBar">
    <div class="history-label">
      <span>ค้นหาล่าสุด</span>
      <span class="history-clear" id="historyClear">ล้างประวัติ</span>
    </div>
    <div class="chips" id="historyChips"></div>
  </div>

  <div id="results"></div>

  <div class="notice" id="welcome">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
    </svg>
    <p>พิมพ์ชื่อเพลงหรือศิลปินที่ชอบด้านบน แล้วกดค้นหาได้เลย</p>
  </div>

  <footer>Muzik Match · ขับเคลื่อนด้วย AI</footer>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const q = $('#q'), go = $('#go'), results = $('#results'), welcome = $('#welcome');
const historyBar = $('#historyBar'), historyChips = $('#historyChips');
let lastQuery = '', lastData = null;

function getHistory() { try { return JSON.parse(localStorage.getItem('mm_history')||'[]'); } catch { return []; } }
function addHistory(term) {
  let h = getHistory().filter(x => x.toLowerCase() !== term.toLowerCase());
  h.unshift(term); h = h.slice(0,8);
  localStorage.setItem('mm_history', JSON.stringify(h)); renderHistory();
}
function renderHistory() {
  const h = getHistory();
  if (!h.length) { historyBar.classList.remove('show'); return; }
  historyBar.classList.add('show');
  historyChips.innerHTML = h.map(t => `<span class="chip history">${escapeHtml(t)}</span>`).join('');
}
$('#historyClear').addEventListener('click', () => { localStorage.removeItem('mm_history'); renderHistory(); });
historyChips.addEventListener('click', e => { if (e.target.classList.contains('chip')) { q.value = e.target.textContent; search(); } });
renderHistory();

const urlQ = new URLSearchParams(location.search).get('q');
if (urlQ) { q.value = urlQ; setTimeout(search, 300); }

$('#chips').addEventListener('click', e => { if (e.target.classList.contains('chip')) { q.value = e.target.textContent; search(); } });
go.addEventListener('click', search);
q.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

async function search() {
  const query = q.value.trim();
  if (!query) { q.focus(); return; }
  lastQuery = query;
  welcome.style.display = 'none';
  go.disabled = true;
  results.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">กำลังค้นหาเพลงและศิลปินที่ใกล้เคียงกับ "${escapeHtml(query)}"...</div></div>`;
  try {
    const res = await fetch('/api/search', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'เกิดข้อผิดพลาด');
    lastData = data;
    addHistory(query);
    render(data, query);
    history.replaceState(null, '', '?q=' + encodeURIComponent(query));
  } catch (err) {
    showError(escapeHtml(err.message));
  } finally {
    go.disabled = false;
  }
}

function render(data, query) {
  let html = `<div class="result-top">
    <span class="result-section-title">ผลลัพธ์สำหรับ "${escapeHtml(query)}"</span>
    <button class="share-btn" id="shareBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
      แชร์
    </button>
  </div>`;

  if (data.artists?.length) {
    html += `<div class="result-section-title" style="margin-top:8px">🎤 ศิลปิน / วงที่คุณน่าจะชอบ</div>`;
    data.artists.forEach((a, i) => { html += artistCard(a, i); });
  }
  if (data.songs?.length) {
    html += `<div class="result-section-title" style="margin-top:8px">🎵 เพลงแนะนำ</div>`;
    data.songs.forEach((s, i) => { html += songCard(s, i + (data.artists?.length||0)); });
  }
  results.innerHTML = html;
  $('#shareBtn').addEventListener('click', shareResult);

  // โหลดรูปศิลปินจาก Wikipedia
  data.artists?.forEach((a, i) => { if (a.wiki) loadArtistImage(a.wiki, 'art-img-' + i); });
}

function artistCard(a, i) {
  const tagHtml = (a.tags||[]).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
  const ytUrl = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(a.name);
  const spUrl = 'https://open.spotify.com/search/' + encodeURIComponent(a.name);
  return `<div class="card-item" style="animation-delay:${i*0.06}s">
    <div class="artist-row">
      <div class="artist-img-fallback" id="art-img-${i}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
      </div>
      <div class="artist-body">
        <div class="card-head">
          <span class="card-name">${escapeHtml(a.name)}</span>
          <span class="card-meta">${escapeHtml(a.genre||'')}</span>
        </div>
        <div class="card-why">${escapeHtml(a.why||'')}</div>
        ${tagHtml ? `<div class="card-tags">${tagHtml}</div>` : ''}
        <div class="listen-row">
          <a class="listen-btn listen-yt" href="${ytUrl}" target="_blank" rel="noopener">${ytIcon()} YouTube</a>
          <a class="listen-btn listen-sp" href="${spUrl}" target="_blank" rel="noopener">${spIcon()} Spotify</a>
        </div>
      </div>
    </div>
  </div>`;
}

function songCard(s, i) {
  const tagHtml = (s.tags||[]).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
  const queryText = `${s.artist} ${s.name}`;
  const spUrl = 'https://open.spotify.com/search/' + encodeURIComponent(queryText);
  const ytSearch = encodeURIComponent(queryText + ' official');
  return `<div class="card-item" style="animation-delay:${i*0.06}s">
    <div class="card-head">
      <span class="card-name">${escapeHtml(s.name)}</span>
      <span class="card-meta">${escapeHtml(s.artist||'')}</span>
    </div>
    <div class="card-why">${escapeHtml(s.why||'')}</div>
    ${tagHtml ? `<div class="card-tags">${tagHtml}</div>` : ''}
    <div class="listen-row">
      <button class="listen-btn listen-yt" onclick="toggleYt(this, '${ytSearch}')">${ytIcon()} ฟังใน YouTube</button>
      <a class="listen-btn listen-sp" href="${spUrl}" target="_blank" rel="noopener">${spIcon()} Spotify</a>
    </div>
    <div class="yt-player"><div class="yt-frame-box" data-loaded="0"></div></div>
  </div>`;
}

async function toggleYt(btn, searchQuery) {
  const card = btn.closest('.card-item');
  const player = card.querySelector('.yt-player');
  const box = card.querySelector('.yt-frame-box');
  const isOpen = player.classList.contains('open');

  // ปิดกล่องอื่นที่เปิดอยู่
  document.querySelectorAll('.yt-player.open').forEach(p => {
    if (p !== player) {
      p.classList.remove('open');
      p.querySelector('.yt-frame-box').innerHTML = '';
      p.querySelector('.yt-frame-box').dataset.loaded = '0';
      const otherBtn = p.closest('.card-item').querySelector('.listen-yt');
      otherBtn.classList.remove('active');
      otherBtn.innerHTML = ytIcon() + ' ฟังใน YouTube';
    }
  });

  if (isOpen) {
    player.classList.remove('open');
    box.innerHTML = ''; box.dataset.loaded = '0';
    btn.classList.remove('active');
    btn.innerHTML = ytIcon() + ' ฟังใน YouTube';
    return;
  }

  // เปิด: โหลดวิดีโอจริงจาก YouTube
  btn.classList.add('active');
  btn.innerHTML = ytIcon() + ' กำลังโหลด...';
  player.classList.add('open');

  try {
    const vid = await findYoutubeId(searchQuery);
    if (vid) {
      box.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
    } else {
      box.innerHTML = `<iframe src="https://www.youtube.com/embed?listType=search&list=${searchQuery}" allowfullscreen></iframe>`;
    }
    btn.innerHTML = ytIcon() + ' ซ่อนวิดีโอ';
  } catch {
    box.innerHTML = `<iframe src="https://www.youtube.com/embed?listType=search&list=${searchQuery}" allowfullscreen></iframe>`;
    btn.innerHTML = ytIcon() + ' ซ่อนวิดีโอ';
  }
}

async function findYoutubeId(searchQuery) {
  try {
    const res = await fetch('/api/youtube?q=' + searchQuery);
    if (!res.ok) return null;
    const data = await res.json();
    return data.videoId || null;
  } catch { return null; }
}

async function loadArtistImage(wikiTitle, elementId) {
  try {
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`;
    const res = await fetch(url);
    if (!res.ok) return;
    const data = await res.json();
    const img = data.thumbnail?.source;
    if (img) {
      const el = document.getElementById(elementId);
      if (el) {
        const imgEl = document.createElement('img');
        imgEl.className = 'artist-img';
        imgEl.src = img;
        imgEl.alt = '';
        imgEl.onerror = () => {};
        el.replaceWith(imgEl);
      }
    }
  } catch {}
}

async function shareResult() {
  const btn = $('#shareBtn');
  const shareUrl = location.origin + location.pathname + '?q=' + encodeURIComponent(lastQuery);
  const shareData = { title: 'Muzik Match', text: `เพลงและศิลปินที่ใกล้เคียงกับ "${lastQuery}"`, url: shareUrl };
  try {
    if (navigator.share) { await navigator.share(shareData); }
    else { await navigator.clipboard.writeText(shareUrl); showToast('คัดลอกลิงก์แล้ว ส่งให้เพื่อนได้เลย'); markShared(btn); }
  } catch (e) {
    try { await navigator.clipboard.writeText(shareUrl); showToast('คัดลอกลิงก์แล้ว'); markShared(btn); } catch {}
  }
}
function markShared(btn) {
  btn.classList.add('done');
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> คัดลอกแล้ว`;
  setTimeout(() => {
    btn.classList.remove('done');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg> แชร์`;
  }, 2500);
}

let toastTimer;
function showToast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
