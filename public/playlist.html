<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>สุ่ม Playlist — Muzik Match</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0a1a;--bg2:#12102a;--card:#1a1730;--card2:#211e3a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.12);
  --text:#f0eeff;--text2:rgba(240,238,255,0.6);--text3:rgba(240,238,255,0.35);
  --purple:#a78bfa;--purple2:#7c3aed;--pink:#f472b6;--orange:#fb923c;
  --green:#1db954;--green2:#17a348;
}
html{scroll-behavior:smooth}
body{font-family:'Inter','Noto Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}

.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:float 12s ease-in-out infinite}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(124,58,237,0.2),transparent 70%);top:-200px;left:-100px}
.orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(244,114,182,0.15),transparent 70%);top:-100px;right:-150px;animation-delay:-4s}
.orb3{width:400px;height:400px;background:radial-gradient(circle,rgba(29,185,84,0.1),transparent 70%);bottom:10%;left:50%;animation-delay:-8s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-50px) scale(1.05)}66%{transform:translate(-20px,20px) scale(0.95)}}

nav{
  position:sticky;top:0;z-index:100;
  background:rgba(13,10,26,0.8);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--purple2),var(--pink));display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(124,58,237,0.4)}
.nav-icon svg{width:20px;height:20px}
.nav-name{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.03em}
.nav-name span{background:linear-gradient(90deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-back{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--text2);text-decoration:none;padding:8px 14px;border-radius:10px;border:1px solid var(--border);transition:all 0.15s}
.nav-back:hover{border-color:var(--border2);color:var(--text)}
.nav-back svg{width:16px;height:16px}

/* HERO */
.hero{
  position:relative;z-index:1;
  text-align:center;
  padding:80px 24px 60px;
  max-width:600px;margin:0 auto;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:var(--green);
  background:rgba(29,185,84,0.1);border:1px solid rgba(29,185,84,0.2);
  border-radius:20px;padding:6px 16px;margin-bottom:24px;
}
.hero h1{
  font-size:clamp(32px,5vw,52px);font-weight:900;
  line-height:1.15;letter-spacing:-0.04em;margin-bottom:16px;
}
.hero h1 .line1{color:var(--text)}
.hero h1 .line2{
  background:linear-gradient(90deg,var(--green),var(--purple),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{
  font-size:17px;color:var(--text2);
  font-family:'Noto Sans Thai',sans-serif;line-height:1.8;
  margin-bottom:48px;
}

/* SHUFFLE AREA */
.shuffle-area{
  position:relative;z-index:1;
  max-width:600px;margin:0 auto;
  padding:0 24px 80px;
}

/* BIG SHUFFLE BUTTON */
.shuffle-main-btn{
  width:100%;padding:22px;
  background:linear-gradient(135deg,var(--green),var(--green2));
  border:none;border-radius:20px;
  color:white;font-size:20px;font-weight:800;
  cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:12px;
  transition:all 0.2s;
  box-shadow:0 8px 32px rgba(29,185,84,0.35);
  margin-bottom:12px;
  letter-spacing:-0.02em;
}
.shuffle-main-btn:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(29,185,84,0.45)}
.shuffle-main-btn:active{transform:translateY(0)}
.shuffle-main-btn svg{width:24px;height:24px;transition:transform 0.5s}
.shuffle-main-btn.spinning svg{animation:spin 0.5s linear}
@keyframes spin{to{transform:rotate(360deg)}}
.shuffle-hint{text-align:center;font-size:13px;color:var(--text3);margin-bottom:40px}

/* RESULT CARD */
.result-wrap{display:none;animation:fadeUp 0.5s ease}
.result-wrap.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.pl-result-card{
  background:var(--card);
  border:1px solid rgba(29,185,84,0.25);
  border-radius:24px;padding:28px;
  position:relative;overflow:hidden;
  box-shadow:0 0 0 1px rgba(29,185,84,0.1),0 16px 48px rgba(0,0,0,0.4);
}
.pl-result-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(29,185,84,0.08),rgba(124,58,237,0.05));
}
.pl-result-top{
  display:flex;align-items:center;gap:20px;
  margin-bottom:20px;position:relative;z-index:1;
}
.pl-result-emoji{
  width:80px;height:80px;border-radius:20px;
  background:linear-gradient(135deg,rgba(29,185,84,0.2),rgba(124,58,237,0.15));
  border:1px solid rgba(29,185,84,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;flex-shrink:0;
}
.pl-result-info{flex:1;min-width:0}
.pl-result-tag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:700;color:var(--green);
  background:rgba(29,185,84,0.1);border:1px solid rgba(29,185,84,0.2);
  border-radius:6px;padding:3px 10px;margin-bottom:8px;
  text-transform:uppercase;letter-spacing:0.05em;
}
.pl-result-name{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.02em;margin-bottom:4px}
.pl-result-desc{font-size:14px;color:var(--text2);font-family:'Noto Sans Thai',sans-serif}

.pl-result-actions{display:flex;gap:12px;position:relative;z-index:1}
.btn-open-spotify{
  flex:1;display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--green);color:white;
  border:none;border-radius:14px;padding:15px;
  font-size:16px;font-weight:700;cursor:pointer;
  font-family:inherit;text-decoration:none;
  transition:all 0.2s;
  box-shadow:0 4px 16px rgba(29,185,84,0.3);
}
.btn-open-spotify:hover{background:var(--green2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(29,185,84,0.4)}
.btn-open-spotify svg{width:20px;height:20px}
.btn-again{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border2);
  border-radius:14px;padding:15px 20px;
  font-size:15px;font-weight:600;color:var(--text2);
  cursor:pointer;font-family:inherit;
  transition:all 0.15s;
}
.btn-again:hover{border-color:var(--border);color:var(--text);background:rgba(255,255,255,0.08)}
.btn-again svg{width:18px;height:18px}

footer{position:relative;z-index:1;text-align:center;padding:24px;border-top:1px solid var(--border);color:var(--text3);font-size:13px}
footer a{color:var(--text3);text-decoration:none}
footer a:hover{color:var(--purple)}
</style>
</head>
<body>

</div>

<section class="hero">

<div class="shuffle-area">

      <div class="pl-result-top">
        <div class="pl-result-emoji" id="resultEmoji">🎵</div>
        <div class="pl-result-info">
          <div class="pl-result-tag" id="resultCat">Playlist</div>

          เปิดใน Spotify
        </a>
        <button class="btn-again" id="againBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          สุ่มใหม่
        </button>
      </div>
    </div>
  </div>

</div>

<footer>Muzik Match · <a href="/">ค้นหาศิลปินและเพลง</a></footer>

// ระบบสุ่มไม่ซ้ำ — วนไปเรื่อยๆ จนครบ แล้วค่อยสุ่มรอบใหม่
var shuffleQueue = [];

function buildQueue() {
  // สร้าง array index สุ่มลำดับใหม่
  var arr = ALL_PLAYLISTS.map(function(_, i) { return i; });
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function getNext() {
  if (shuffleQueue.length === 0) shuffleQueue = buildQueue();
  return shuffleQueue.pop();
}

function shuffle() {
  var btn = document.getElementById('shuffleBtn');
  btn.classList.add('spinning');
  setTimeout(function() {
    btn.classList.remove('spinning');
    var idx = getNext();
    var pl = ALL_PLAYLISTS[idx];
    document.getElementById('resultEmoji').textContent = pl.emoji;
    document.getElementById('resultCat').textContent = pl.cat;
    document.getElementById('resultName').textContent = pl.name;
    document.getElementById('resultDesc').textContent = pl.desc;
    document.getElementById('resultLink').href = pl.url;
    var wrap = document.getElementById('resultWrap');
    wrap.classList.remove('show');
    void wrap.offsetWidth;
    wrap.classList.add('show');
    wrap.scrollIntoView({behavior:'smooth', block:'center'});
  }, 400);
}

document.getElementById('shuffleBtn').addEventListener('click', shuffle);
document.getElementById('againBtn').addEventListener('click', shuffle);
</script>
</body>
</html>
